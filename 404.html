<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found | Soundarya Chandra Mohan</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@700;800&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --color-bg: #0F1624;
      --color-surface: #1A2236;
      --color-accent: #38BDF8;
      --color-teal: #2DD4BF;
      --color-text-primary: #F1F5F9;
      --color-text-secondary: #94A3B8;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--color-bg);
      color: var(--color-text-primary);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }
    .code {
      font-family: 'Sora', system-ui, sans-serif;
      font-weight: 800;
      font-size: clamp(5rem, 20vw, 9rem);
      background: linear-gradient(135deg, var(--color-accent), var(--color-teal));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1;
      margin-bottom: 1.5rem;
    }
    h1 {
      font-family: 'Sora', system-ui, sans-serif;
      font-size: clamp(1.2rem, 3vw, 1.8rem);
      margin-bottom: 0.75rem;
    }
    p {
      color: var(--color-text-secondary);
      margin-bottom: 2rem;
    }
    a {
      display: inline-block;
      background: var(--color-accent);
      color: #0F1624;
      font-weight: 700;
      font-size: 0.95rem;
      padding: 0.65rem 1.75rem;
      border-radius: 999px;
      text-decoration: none;
      transition: background 0.2s ease;
    }
    a:hover { background: var(--color-teal); }
  </style>
</head>
<body>
  <div>
    <div class="code">404</div>
    <h1>Page Not Found</h1>
    <p>The page you're looking for doesn't exist.</p>
    <a href="index.html">Back to Portfolio</a>
  </div>
</body>
</html>
